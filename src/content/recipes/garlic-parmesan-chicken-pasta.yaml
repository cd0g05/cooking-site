title: Garlic Parmesan Chicken Pasta
description: >-
  A weeknight staple built around a from-scratch alfredo: seared chicken
  breast, a garlic-and-Parmesan cream sauce loosened with starchy pasta
  water, and just enough white wine to keep it from tasting heavy. On the
  table in well under an hour.
tags:
  - Comfort Food
  - Weeknight Dinner
date: 2026-05-01
meta:
  - label: Serves
    value: 4-6
  - label: Active Time
    value: ~30 minutes
  - label: Total Time
    value: ~30 minutes
prepTime: PT10M
cookTime: PT20M
totalTime: PT30M
recipeYield: 4-6 servings
ingredientGroups:
  - name: For the chicken
    items:
      - 2 tbsp olive oil
      - 1 lb chicken breast, thinly sliced
      - 2 tsp dried oregano
      - 1 tsp garlic powder
      - "½ tsp smoked paprika"
      - Kosher salt and freshly ground black pepper
  - name: For the pasta
    items:
      - 16 oz penne
      - Kosher salt, for the pasta water
  - name: For the sauce
    items:
      - 4 tbsp unsalted butter
      - 6-8 cloves garlic, thinly sliced
      - 2 tsp dried oregano
      - 4 tbsp all-purpose flour
      - "½ cup dry white wine (or chicken broth)"
      - 3 cups heavy cream
      - 1 cup finely grated Parmesan, plus more for serving
      - "½ cup reserved pasta water, as needed"
      - Fresh parsley, chopped, for serving
steps:
  - title: Cook the Pasta
    text: >-
      Bring a large pot of heavily salted water to a boil and cook the penne
      until just al dente, according to package directions. Reserve ½ cup
      pasta water, then drain.
  - title: Sear the Chicken
    text: >-
      Heat the olive oil in a large sauté pan over medium heat. Season the
      chicken on both sides with oregano, garlic powder, paprika, salt, and
      pepper. Sear until deeply golden on each side and cooked through, 4-6
      minutes per side. Transfer to a plate to rest.
  - title: Build the Roux
    text: >-
      Melt the butter in the same pan over medium-low heat. Add the garlic,
      oregano, and a pinch each of salt and pepper, and cook, stirring
      frequently, for 1 minute until fragrant. Stir in the flour and cook for
      another minute, stirring constantly.
  - title: Deglaze and Simmer
    text: >-
      Pour in the white wine, scraping up any browned bits from the bottom of
      the pan, and let it bubble for 1 minute. Whisk in the heavy cream and
      simmer over medium-low heat, stirring occasionally, until smooth and
      slightly thickened, a few minutes.
  - title: Finish the Sauce
    text: >-
      Stir in the Parmesan until melted and the sauce reaches a glossy,
      coating consistency. Season to taste with salt and pepper.
  - title: Combine and Serve
    text: >-
      Slice the rested chicken into strips. Add the pasta to the sauce and
      toss to coat, thinning with a splash of reserved pasta water as needed.
      Fold in the chicken and toss until everything is warmed through.
      Garnish with extra Parmesan and parsley.
notes:
  - title: Salt the pasta water
    text: >-
      Don't skip this—it's your first and best chance to season the noodles
      themselves, and it carries through into the sauce once the pasta water
      goes in.
  - title: Slice the chicken thin
    text: >-
      Cutting each breast in half lengthwise gives you two thinner cutlets
      that cook through fully during the 4-6 minute sear. If a piece is still
      pink at the center, finish it in a 350°F oven while you build the
      sauce.
  - title: The sauce thickens as it cools
    text: >-
      Loosen leftovers with a splash of cream, milk, or broth when reheating.
